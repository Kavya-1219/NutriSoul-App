# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.disallowKotlinSourceSets=false

# Windows-specific fix for file locking
org.gradle.vfs.watch=false
# Disabling daemon forces processes to release file handles after build
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configuration-cache=false

# Disable incremental compilation to prevent "New files found" locking errors
kotlin.incremental=false
ksp.incremental=false
kotlin.compiler.execution.strategy=in-process

# Hilt specific settings to fix "Unable to delete directory"
# Disabling aggregating task is often the only way to fix this on some Windows setups
hilt.enableAggregatingTask=false
hilt.incremental=false

android.suppressUnsupportedCompileSdk=35
